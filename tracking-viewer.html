<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Tracking Viewer</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    body {
      margin: 0;
      background: #f7f7f8;
      color: #1c1c1e;
    }
    header {
      padding: 16px 24px;
      background: #0f172a;
      color: #f8fafc;
    }
    main {
      padding: 20px 24px 40px;
      display: grid;
      gap: 20px;
    }
    .panel {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      padding: 16px;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      align-items: end;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input[type="file"],
    input[type="number"],
    input[type="color"],
    button {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5f5;
      border-radius: 8px;
      font-size: 14px;
    }
    input[type="color"] {
      padding: 0;
      height: 38px;
      background: #ffffff;
    }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .canvas-wrap {
      display: grid;
      justify-items: center;
      padding: 12px;
    }
    canvas {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #0f172a;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      font-size: 14px;
    }
    .chip {
      padding: 8px 10px;
      border-radius: 999px;
      background: #f1f5f9;
      text-align: center;
      font-weight: 600;
    }
    .formation {
      display: grid;
      gap: 12px;
    }
    .formation-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .player-table {
      display: grid;
      gap: 8px;
    }
    .player-row {
      display: grid;
      grid-template-columns: minmax(140px, 1fr) 70px 80px 80px 90px 90px;
      gap: 8px;
      align-items: center;
      padding: 6px 8px;
      border-radius: 10px;
      background: #f8fafc;
      font-size: 13px;
    }
    .player-row input[type="number"] {
      padding: 6px 8px;
    }
    .player-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .player-badge {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      display: inline-block;
    }
    .table-header {
      display: grid;
      grid-template-columns: minmax(140px, 1fr) 70px 80px 80px 90px 90px;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #475569;
      padding: 0 8px;
      text-transform: uppercase;
    }
    .formation-hint {
      font-size: 13px;
      color: #475569;
      margin: 0;
    }
    .coord-cell {
      font-variant-numeric: tabular-nums;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <header>
    <h1>Defensive Structure</h1>
  </header>
  <main>
    <section class="panel controls">
      <div>
        <label for="matchInfo">Match info JSON</label>
        <input id="matchInfo" type="file" accept="application/json" />
      </div>
      <div>
        <label for="trackingData">Tracking JSONL</label>
        <input id="trackingData" type="file" accept="application/json,application/jsonl,.jsonl,.txt" />
      </div>
      <div>
        <label for="pitchImage">Pitch PNG</label>
        <input id="pitchImage" type="file" accept="image/png" />
      </div>
      <div>
        <label for="homeColor">Home team color</label>
        <input id="homeColor" type="color" value="#FF0000" />
      </div>
      <div>
        <label for="awayColor">Away team color</label>
        <input id="awayColor" type="color" value="#e0edff" />
      </div>
      <div>
        <label for="homeLineColor">Home line color</label>
        <input id="homeLineColor" type="color" value="#ff0000" />
      </div>
      <div>
        <label for="awayLineColor">Away line color</label>
        <input id="awayLineColor" type="color" value="#e0edff" />
      </div>
      <div>
        <label for="fps">Playback FPS</label>
        <input id="fps" type="number" min="1" max="120" value="25" />
      </div>
      <div>
        <label for="timeMinute">Minute</label>
        <input id="timeMinute" type="number" min="0" value="0" />
      </div>
      <div>
        <label for="timeSecond">Second</label>
        <input id="timeSecond" type="number" min="0" max="59" value="0" />
      </div>
      <div>
        <label>&nbsp;</label>
        <button id="timeGoButton" disabled>Go to time</button>
      </div>
      <div>
        <label>&nbsp;</label>
        <button id="playButton" disabled>Play</button>
      </div>
      <div>
        <label>&nbsp;</label>
        <button id="pauseButton" disabled>Pause</button>
      </div>
    </section>

    <section class="panel meta" id="metaPanel">
      <div class="chip" id="matchName">Match: -</div>
      <div class="chip" id="scoreLine">Score: -</div>
      <div class="chip" id="frameInfo">Frame: -</div>
      <div class="chip" id="periodInfo">Period: -</div>
    </section>

    <section class="panel canvas-wrap">
      <canvas id="pitchCanvas" width="1200" height="760"></canvas>
    </section>

    <section class="panel formation" id="formationPanel">
      <h2>Formation lines</h2>
      <div class="formation-grid">
        <div>
          <h3 id="homeTeamLabel">Home team</h3>
          <div class="table-header">
            <span>Player</span>
            <span>Pos</span>
            <span>X</span>
            <span>Y</span>
            <span>Line ID</span>
            <span>Order</span>
          </div>
          <div class="player-table" id="homePlayerTable"></div>
        </div>
        <div>
          <h3 id="awayTeamLabel">Away team</h3>
          <div class="table-header">
            <span>Player</span>
            <span>Pos</span>
            <span>X</span>
            <span>Y</span>
            <span>Line ID</span>
            <span>Order</span>
          </div>
          <div class="player-table" id="awayPlayerTable"></div>
        </div>
      </div>
      <p class="formation-hint">Only players on the pitch appear here. Assign the same line ID and increasing order to connect them.</p>
    </section>
  </main>

  <script>
    const matchInfoInput = document.getElementById("matchInfo");
    const trackingInput = document.getElementById("trackingData");
    const pitchInput = document.getElementById("pitchImage");
    const playButton = document.getElementById("playButton");
    const pauseButton = document.getElementById("pauseButton");
    const fpsInput = document.getElementById("fps");
    const homeColorInput = document.getElementById("homeColor");
    const awayColorInput = document.getElementById("awayColor");
    const homeLineColorInput = document.getElementById("homeLineColor");
    const awayLineColorInput = document.getElementById("awayLineColor");
    const timeMinuteInput = document.getElementById("timeMinute");
    const timeSecondInput = document.getElementById("timeSecond");
    const timeGoButton = document.getElementById("timeGoButton");

    const matchNameEl = document.getElementById("matchName");
    const scoreLineEl = document.getElementById("scoreLine");
    const frameInfoEl = document.getElementById("frameInfo");
    const periodInfoEl = document.getElementById("periodInfo");

    const homeTeamLabel = document.getElementById("homeTeamLabel");
    const awayTeamLabel = document.getElementById("awayTeamLabel");
    const homePlayerTable = document.getElementById("homePlayerTable");
    const awayPlayerTable = document.getElementById("awayPlayerTable");

    const canvas = document.getElementById("pitchCanvas");
    const ctx = canvas.getContext("2d");

    let matchInfo = null;
    let trackingFrames = [];
    let pitchImage = null;
    let animationHandle = null;
    let frameIndex = 0;
    let lastFrameTime = 0;

    let playerTeamMap = new Map();
    let formationAssignments = new Map();
    let homeColor = "#ff0000";
    let awayColor = "#e0edff";
    let homeLineColor = "#ff0000";
    let awayLineColor = "#e0edff";

    const POSITION_GROUP_LINE_MAP = new Map([
      ["center forward", 4],
      ["central defender", 2],
      ["wide attacker", 4],
      ["midfield", 3],
      ["full back", 2],
      ["other", 1],
    ]);

    function updateButtons() {
      const ready = matchInfo && trackingFrames.length > 0 && pitchImage;
      playButton.disabled = !ready;
      pauseButton.disabled = !ready;
      timeGoButton.disabled = !ready;
    }

    function syncColorInputs() {
      homeColorInput.value = homeColor;
      awayColorInput.value = awayColor;
      homeLineColorInput.value = homeLineColor;
      awayLineColorInput.value = awayLineColor;
    }

    function parseJSONFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            resolve(JSON.parse(reader.result));
          } catch (error) {
            reject(error);
          }
        };
        reader.onerror = reject;
        reader.readAsText(file);
      });
    }

    function parseJSONLFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const lines = reader.result
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean);
            const frames = lines.map((line) => JSON.parse(line));
            resolve(frames);
          } catch (error) {
            reject(error);
          }
        };
        reader.onerror = reject;
        reader.readAsText(file);
      });
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function normalizePositionName(value) {
      if (!value) return "";
      return String(value).toLowerCase().trim();
    }

    function getPlayerPositionName(player) {
      if (!player) return "";
      if (typeof player.position === "string") return player.position;
      if (player.position?.name) return player.position.name;
      if (player.position?.short_name) return player.position.short_name;
      if (player.position?.abbreviation) return player.position.abbreviation;
      if (player.player_role?.name) return player.player_role.name;
      if (player.player_role?.position_group) return player.player_role.position_group;
      if (player.player_role?.acronym) return player.player_role.acronym;
      return (
        player.position_name ||
        player.position_short_name ||
        player.role ||
        player.primary_position ||
        ""
      );
    }

    function getPositionGroupName(player) {
      if (!player) return "";
      if (typeof player.position_group === "string") return player.position_group;
      if (player.position_group?.name) return player.position_group.name;
      if (player.positionGroup?.name) return player.positionGroup.name;
      if (player.player_role?.position_group) return player.player_role.position_group;
      return player.positionGroup || player.position_group_name || "";
    }

    function getExplicitNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) && number > 0 ? number : null;
    }

    function getAssignmentFromTrackingPlayer(player) {
      if (!player) return null;
      const lineId = getExplicitNumber(
        player.line_id ??
          player.lineId ??
          player.position_line ??
          player.position_line_id ??
          player.position_group
      );
      const order = getExplicitNumber(
        player.line_order ??
          player.lineOrder ??
          player.position_order ??
          player.position_order_id ??
          player.order ??
          player.formation_order ??
          player.formation_place
      );
      if (!lineId && !order) return null;
      return { lineId, order };
    }

    function getPositionKey(positionName) {
      const normalized = normalizePositionName(positionName);
      if (!normalized) return "";
      const replacements = [
        ["goalkeeper", "gk"],
        ["keeper", "gk"],
        ["left back", "lb"],
        ["right back", "rb"],
        ["left wing back", "lwb"],
        ["right wing back", "rwb"],
        ["left center back", "lcb"],
        ["right center back", "rcb"],
        ["center back", "cb"],
        ["defensive midfield", "dm"],
        ["central midfield", "cm"],
        ["attacking midfield", "am"],
        ["left midfield", "lm"],
        ["right midfield", "rm"],
        ["left wing", "lw"],
        ["right wing", "rw"],
        ["center forward", "cf"],
        ["second striker", "ss"],
        ["striker", "st"],
      ];
      let simplified = normalized.replace(/[-_/]/g, " ").replace(/\s+/g, " ").trim();
      replacements.forEach(([phrase, key]) => {
        if (simplified.includes(phrase)) {
          simplified = key;
        }
      });
      return simplified.replace(/\s+/g, "");
    }

    function getPositionAcronym(player) {
      const explicitAcronym =
        player?.position?.acronym ||
        player?.position?.short_name ||
        player?.player_role?.acronym ||
        player?.player_role?.position_group;
      if (explicitAcronym) return String(explicitAcronym).toUpperCase();
      const positionName = getPlayerPositionName(player);
      const key = getPositionKey(positionName);
      if (key) return key.toUpperCase();
      if (!positionName) return "";
      return String(positionName).toUpperCase();
    }

    function getLineIdFromPositionGroup(positionGroup) {
      const normalized = normalizePositionName(positionGroup);
      if (!normalized) return null;
      return POSITION_GROUP_LINE_MAP.get(normalized) ?? null;
    }

    function getLineIdFromPosition(positionKey) {
      const key = normalizePositionName(positionKey);
      if (!key) return null;
      if (key.includes("gk") || key.includes("keeper")) return 1;
      const defenderKeys = ["lb", "lwb", "lcb", "cb", "rcb", "rb", "rwb", "wb", "def", "back"];
      const midfielderKeys = ["dm", "ldm", "rdm", "cm", "lcm", "rcm", "am", "cam", "lam", "ram", "lm", "rm", "mid", "mf"];
      const forwardKeys = ["lw", "rw", "lf", "rf", "cf", "st", "ss", "fw", "fwd", "forward", "striker", "wing"];
      if (defenderKeys.some((token) => key.includes(token))) return 2;
      if (midfielderKeys.some((token) => key.includes(token))) return 3;
      if (forwardKeys.some((token) => key.includes(token))) return 4;
      return null;
    }

    function getOrderFromPositionKey(lineId, positionKey) {
      if (!lineId || !positionKey) return null;
      const key = normalizePositionName(positionKey);
      if (lineId === 1) return 1;
      const lineOrders = {
        2: ["lwb", "lb", "lcb", "cb", "rcb", "rb", "rwb"],
        3: ["lm", "lcm", "cm", "rcm", "rm", "ldm", "dm", "rdm", "lam", "cam", "am", "ram"],
        4: ["lw", "lf", "cf", "st", "rf", "rw"],
      };
      const orderList = lineOrders[lineId];
      if (!orderList) return null;
      const index = orderList.findIndex((token) => key.includes(token));
      return index >= 0 ? index + 1 : null;
    }

    function getDefaultAssignmentForPlayer(player) {
      if (!player) return null;
      const explicitLineId = getExplicitNumber(
        player.line_id ??
          player.lineId ??
          player.position_line ??
          player.position_line_id ??
          player.position_group
      );
      const explicitOrder = getExplicitNumber(
        player.line_order ??
          player.lineOrder ??
          player.position_order ??
          player.position_order_id ??
          player.order ??
          player.formation_order ??
          player.formation_place
      );
      const positionName = getPlayerPositionName(player);
      const positionKey = getPositionKey(positionName);
      const positionGroupName = getPositionGroupName(player);
      const lineId =
        explicitLineId ??
        getLineIdFromPositionGroup(positionGroupName) ??
        getLineIdFromPosition(positionKey || positionName);
      const order = explicitOrder ?? getOrderFromPositionKey(lineId, positionKey || positionName);
      if (!lineId && !order) return null;
      return {
        lineId,
        order,
      };
    }

    function ensureDefaultAssignment(playerId, defaultAssignment) {
      if (!defaultAssignment || formationAssignments.has(playerId)) return;
      formationAssignments.set(playerId, {
        lineId: defaultAssignment.lineId ?? null,
        order: defaultAssignment.order ?? null,
      });
    }

    function seedAssignmentsFromFrame(frame) {
      if (!frame) return;
      (frame.player_data || []).forEach((player) => {
        const assignment = getAssignmentFromTrackingPlayer(player);
        if (!assignment) return;
        const current = formationAssignments.get(player.player_id);
        const nextLineId = assignment.lineId ?? current?.lineId ?? null;
        const nextOrder = assignment.order ?? current?.order ?? null;
        if (!current || (!current.lineId && !current.order)) {
          formationAssignments.set(player.player_id, {
            lineId: nextLineId,
            order: nextOrder,
          });
          return;
        }
        if ((current.lineId == null && nextLineId != null) || (current.order == null && nextOrder != null)) {
          formationAssignments.set(player.player_id, {
            lineId: current.lineId ?? nextLineId,
            order: current.order ?? nextOrder,
          });
        }
      });
    }

    function formatPlayerName(player) {
      if (!player) return "";
      if (player.name) return player.name;
      if (player.short_name) return player.short_name;
      const fullName = [player.first_name, player.last_name].filter(Boolean).join(" ").trim();
      return fullName || "";
    }

    function buildPlayerMap(info) {
      playerTeamMap = new Map();
      formationAssignments = new Map();
      info.players.forEach((player) => {
        const defaultAssignment = getDefaultAssignmentForPlayer(player);
        const positionAcronym = getPositionAcronym(player);
        const jerseyNumber = player.jersey_number ?? player.number ?? player.jerseyNumber ?? null;
        playerTeamMap.set(player.id, {
          teamId: player.team_id,
          name: formatPlayerName(player),
          jerseyNumber,
          defaultAssignment,
          positionAcronym,
        });
        if (defaultAssignment) {
          formationAssignments.set(player.id, {
            lineId: defaultAssignment.lineId ?? null,
            order: defaultAssignment.order ?? null,
          });
        }
      });
    }

    function updateMeta(frame) {
      if (!matchInfo) return;
      matchNameEl.textContent = `Match: ${matchInfo.home_team.name} vs ${matchInfo.away_team.name}`;
      scoreLineEl.textContent = `Score: ${matchInfo.home_team_score} - ${matchInfo.away_team_score}`;
      frameInfoEl.textContent = `Frame: ${frame.frame ?? "-"} | Time: ${frame.timestamp ?? "-"}`;
      periodInfoEl.textContent = `Period: ${frame.period ?? "-"}`;
    }

    function getFieldDimensions() {
      const length = matchInfo?.pitch_length ?? 105;
      const width = matchInfo?.pitch_width ?? 68;
      return { length, width };
    }

    function worldToCanvas(x, y) {
      const { length, width } = getFieldDimensions();
      const padding = 20;
      const fieldWidth = canvas.width - padding * 2;
      const fieldHeight = canvas.height - padding * 2;
      const scaleX = fieldWidth / length;
      const scaleY = fieldHeight / width;
      const cx = padding + (x + length / 2) * scaleX;
      const cy = padding + (width / 2 - y) * scaleY;
      return { x: cx, y: cy };
    }

    function formatCoord(value) {
      if (value === null || value === undefined) return "-";
      return Number(value).toFixed(2);
    }

    function parseTimestampToSeconds(value) {
      if (value === null || value === undefined) return null;
      if (typeof value === "number") return Number.isFinite(value) ? value : null;
      const text = String(value).trim();
      if (!text) return null;
      if (/^\d+(\.\d+)?$/.test(text)) {
        const numericValue = Number(text);
        return Number.isFinite(numericValue) ? numericValue : null;
      }
      const parts = text.split(":").map((part) => part.trim());
      if (parts.length < 2 || parts.length > 3) return null;
      const seconds = Number.parseFloat(parts[parts.length - 1]);
      const minutes = Number.parseInt(parts[parts.length - 2], 10);
      if (!Number.isFinite(seconds) || !Number.isFinite(minutes)) return null;
      let hours = 0;
      if (parts.length === 3) {
        hours = Number.parseInt(parts[0], 10);
        if (!Number.isFinite(hours)) return null;
      }
      return hours * 3600 + minutes * 60 + seconds;
    }

    function getFrameTimeSeconds(frame) {
      if (!frame) return null;
      const candidate = frame.timestamp ?? frame.time ?? frame.clock ?? frame.ts;
      return parseTimestampToSeconds(candidate);
    }

    function findClosestFrameIndex(targetSeconds) {
      if (!trackingFrames.length || targetSeconds == null) return null;
      let closestIndex = null;
      let smallestDelta = Number.POSITIVE_INFINITY;
      trackingFrames.forEach((frame, index) => {
        const seconds = getFrameTimeSeconds(frame);
        if (seconds == null) return;
        const delta = Math.abs(seconds - targetSeconds);
        if (delta < smallestDelta) {
          smallestDelta = delta;
          closestIndex = index;
        }
      });
      return closestIndex;
    }

    function drawFormationLines(frame) {
      if (!frame || !matchInfo) return;

      const positions = new Map();
      (frame.player_data || []).forEach((player) => {
        if (player.x === null || player.y === null) return;
        const info = playerTeamMap.get(player.player_id);
        if (!info) return;
        positions.set(player.player_id, {
          point: worldToCanvas(player.x, player.y),
          teamId: info.teamId,
        });
      });

      const lineGroups = new Map();
      formationAssignments.forEach((assignment, playerId) => {
        if (!assignment?.lineId || !assignment?.order) return;
        const position = positions.get(playerId);
        if (!position) return;
        const key = `${position.teamId}-${assignment.lineId}`;
        if (!lineGroups.has(key)) {
          lineGroups.set(key, {
            teamId: position.teamId,
            points: [],
          });
        }
        lineGroups.get(key).points.push({
          order: assignment.order,
          point: position.point,
        });
      });

      lineGroups.forEach((group) => {
        if (group.points.length < 2) return;
        group.points.sort((a, b) => a.order - b.order);
        const color = group.teamId === matchInfo.home_team.id ? homeLineColor : awayLineColor;
        ctx.strokeStyle = `${color}aa`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        group.points.forEach((item, index) => {
          if (index === 0) {
            ctx.moveTo(item.point.x, item.point.y);
          } else {
            ctx.lineTo(item.point.x, item.point.y);
          }
        });
        ctx.stroke();
      });
    }

    function drawFrame(frame) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (pitchImage) {
        ctx.drawImage(pitchImage, 0, 0, canvas.width, canvas.height);
      }

      if (!frame) {
        renderPlayerTables(null);
        return;
      }

      drawFormationLines(frame);

      // Draw ball
      if (frame.ball_data) {
        const { x, y, is_detected } = frame.ball_data;
        if (x !== null && y !== null) {
          const point = worldToCanvas(x, y);
          ctx.beginPath();
          ctx.fillStyle = is_detected ? "#fbbf24" : "#f97316";
          ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Draw players
      (frame.player_data || []).forEach((player) => {
        const { x, y, player_id, is_detected } = player;
        if (x === null || y === null) return;
        const playerInfo = playerTeamMap.get(player_id);
        const teamId = playerInfo?.teamId;
        const fill = teamId === matchInfo.home_team.id ? homeColor : awayColor;
        const point = worldToCanvas(x, y);
        ctx.beginPath();
        ctx.fillStyle = fill;
        ctx.globalAlpha = is_detected ? 1 : 0.55;
        ctx.arc(point.x, point.y, 9, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        if (playerInfo?.name) {
          ctx.fillStyle = "#000000";
          ctx.font = "12px \"Segoe UI\", system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.fillText(playerInfo.name, point.x, point.y + 12);
        }
      });

      renderPlayerTables(frame);
      updateMeta(frame);
    }

    function animate(timestamp) {
      if (!lastFrameTime) lastFrameTime = timestamp;
      const fps = Math.max(1, Number(fpsInput.value) || 25);
      const frameDuration = 1000 / fps;
      const elapsed = timestamp - lastFrameTime;

      if (elapsed >= frameDuration) {
        drawFrame(trackingFrames[frameIndex]);
        frameIndex = (frameIndex + 1) % trackingFrames.length;
        lastFrameTime = timestamp;
      }

      animationHandle = requestAnimationFrame(animate);
    }

    function createPlayerRow(player, teamColor, position, defaultAssignment, positionAcronym) {
      const row = document.createElement("div");
      row.className = "player-row";

      const name = document.createElement("div");
      name.className = "player-name";
      const badge = document.createElement("span");
      badge.className = "player-badge";
      badge.style.background = teamColor;
      const label = document.createElement("span");
      const number = player.jersey_number ? `#${player.jersey_number}` : "";
      label.textContent = `${number} ${player.name || player.short_name || player.id}`.trim();
      name.appendChild(badge);
      name.appendChild(label);

      const positionCell = document.createElement("span");
      positionCell.className = "coord-cell";
      positionCell.textContent = positionAcronym || "-";

      const xCell = document.createElement("span");
      xCell.className = "coord-cell";
      xCell.textContent = formatCoord(position.x);

      const yCell = document.createElement("span");
      yCell.className = "coord-cell";
      yCell.textContent = formatCoord(position.y);

      const lineInput = document.createElement("input");
      lineInput.type = "number";
      lineInput.min = "1";
      lineInput.placeholder = "1";
      lineInput.dataset.playerId = player.id;
      lineInput.dataset.field = "lineId";

      const orderInput = document.createElement("input");
      orderInput.type = "number";
      orderInput.min = "1";
      orderInput.placeholder = "1";
      orderInput.dataset.playerId = player.id;
      orderInput.dataset.field = "order";

      ensureDefaultAssignment(player.id, defaultAssignment);
      let assignment = formationAssignments.get(player.id);
      if (assignment?.lineId) lineInput.value = assignment.lineId;
      if (assignment?.order) orderInput.value = assignment.order;

      [lineInput, orderInput].forEach((input) => {
        input.addEventListener("input", (event) => {
          const playerId = Number(event.target.dataset.playerId);
          const field = event.target.dataset.field;
          const value = Number(event.target.value);
          const current = formationAssignments.get(playerId) || {};
          if (!Number.isFinite(value) || value <= 0) {
            const updated = { ...current, [field]: null };
            formationAssignments.set(playerId, updated);
          } else {
            formationAssignments.set(playerId, {
              ...current,
              [field]: value,
            });
          }
          drawFrame(trackingFrames[frameIndex]);
        });
      });

      row.appendChild(name);
      row.appendChild(positionCell);
      row.appendChild(xCell);
      row.appendChild(yCell);
      row.appendChild(lineInput);
      row.appendChild(orderInput);

      return row;
    }

    function renderPlayerTables(frame) {
      if (!matchInfo || !frame) {
        homePlayerTable.innerHTML = "";
        awayPlayerTable.innerHTML = "";
        return;
      }

      seedAssignmentsFromFrame(frame);

      homePlayerTable.innerHTML = "";
      awayPlayerTable.innerHTML = "";

      homeTeamLabel.textContent = matchInfo.home_team.name;
      awayTeamLabel.textContent = matchInfo.away_team.name;

      const playersOnPitch = (frame.player_data || [])
        .filter((player) => player.x !== null && player.y !== null)
        .map((player) => ({
          ...player,
          info: playerTeamMap.get(player.player_id),
        }))
        .filter((player) => player.info);

      const homePlayers = playersOnPitch.filter(
        (player) => player.info.teamId === matchInfo.home_team.id
      );
      const awayPlayers = playersOnPitch.filter(
        (player) => player.info.teamId === matchInfo.away_team.id
      );

      homePlayers.forEach((player) => {
        homePlayerTable.appendChild(
          createPlayerRow(
            {
              id: player.player_id,
              name: player.info.name,
              short_name: player.info.name,
              jersey_number: player.info.jerseyNumber,
            },
            homeColor,
            { x: player.x, y: player.y },
            player.info.defaultAssignment,
            player.info.positionAcronym
          )
        );
      });
      awayPlayers.forEach((player) => {
        awayPlayerTable.appendChild(
          createPlayerRow(
            {
              id: player.player_id,
              name: player.info.name,
              short_name: player.info.name,
              jersey_number: player.info.jerseyNumber,
            },
            awayColor,
            { x: player.x, y: player.y },
            player.info.defaultAssignment,
            player.info.positionAcronym
          )
        );
      });
    }

    homeColorInput.addEventListener("input", (event) => {
      homeColor = event.target.value || homeColor;
      renderPlayerTables(trackingFrames[frameIndex]);
      drawFrame(trackingFrames[frameIndex]);
    });

    awayColorInput.addEventListener("input", (event) => {
      awayColor = event.target.value || awayColor;
      renderPlayerTables(trackingFrames[frameIndex]);
      drawFrame(trackingFrames[frameIndex]);
    });

    homeLineColorInput.addEventListener("input", (event) => {
      homeLineColor = event.target.value || homeLineColor;
      drawFrame(trackingFrames[frameIndex]);
    });

    awayLineColorInput.addEventListener("input", (event) => {
      awayLineColor = event.target.value || awayLineColor;
      drawFrame(trackingFrames[frameIndex]);
    });

    timeGoButton.addEventListener("click", () => {
      const minutes = Math.max(0, Number(timeMinuteInput.value) || 0);
      const seconds = Math.max(0, Number(timeSecondInput.value) || 0);
      const targetSeconds = minutes * 60 + seconds;
      const nextIndex = findClosestFrameIndex(targetSeconds);
      if (nextIndex == null) {
        alert("No timestamp data found to jump to that time.");
        return;
      }
      frameIndex = nextIndex;
      lastFrameTime = 0;
      drawFrame(trackingFrames[frameIndex]);
    });

    matchInfoInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        matchInfo = await parseJSONFile(file);
        syncColorInputs();
        buildPlayerMap(matchInfo);
        renderPlayerTables(trackingFrames[frameIndex]);
        updateMeta({});
        updateButtons();
      } catch (error) {
        alert("Failed to parse match info JSON.");
        console.error(error);
      }
    });

    trackingInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        trackingFrames = await parseJSONLFile(file);
        frameIndex = 0;
        seedAssignmentsFromFrame(trackingFrames[frameIndex]);
        updateButtons();
        drawFrame(trackingFrames[frameIndex]);
      } catch (error) {
        alert("Failed to parse tracking JSONL.");
        console.error(error);
      }
    });

    pitchInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        pitchImage = await loadImage(file);
        drawFrame(trackingFrames[frameIndex]);
        updateButtons();
      } catch (error) {
        alert("Failed to load pitch image.");
        console.error(error);
      }
    });

    playButton.addEventListener("click", () => {
      if (animationHandle) cancelAnimationFrame(animationHandle);
      lastFrameTime = 0;
      animationHandle = requestAnimationFrame(animate);
    });

    pauseButton.addEventListener("click", () => {
      if (animationHandle) {
        cancelAnimationFrame(animationHandle);
        animationHandle = null;
      }
    });
  </script>
</body>
</html>
